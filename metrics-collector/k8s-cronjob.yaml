apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-collector
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-collector-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metrics-collector-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: metrics-collector
    namespace: default
roleRef:
  kind: Role
  name: metrics-collector-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: metrics-collector
  namespace: default
spec:
  schedule: "* * * * *"  # Every minute
  concurrencyPolicy: Forbid  # Don't run if previous job still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120  # Clean up completed jobs after 2 minutes
      template:
        spec:
          serviceAccountName: metrics-collector
          restartPolicy: OnFailure
          containers:
            - name: collector
              image: registry.digitalocean.com/calvin-apps/metrics-collector:latest
              imagePullPolicy: Always
              env:
                - name: NAMESPACE
                  value: "default"
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-secrets
                      key: S3_ENDPOINT
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-secrets
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-secrets
                      key: S3_SECRET_KEY
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-secrets
                      key: S3_BUCKET
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: scheduler-secrets
                      key: S3_REGION
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
          imagePullSecrets:
            - name: regcred
